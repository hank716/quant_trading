services:
  quant-ui:
    build:
      context: ..
      dockerfile: docker/ui.Dockerfile
    image: fin-ui:latest
    container_name: fin-quant-ui
    ports:
      - "8501:8501"
    volumes:
      - ../workspace:/app/workspace
    env_file:
      - path: ../.env.local
        required: false
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: fin-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: fin-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    restart: unless-stopped

  quant-sync:
    image: fin-app:test
    build:
      context: ..
      dockerfile: docker/app.Dockerfile
    profiles: ["jobs"]
    volumes:
      - ../workspace:/app/workspace
      - ../outputs:/app/outputs
    env_file:
      - path: ../.env.local
        required: false
    command: ["python", "sync_data.py"]

  quant-financials:
    image: fin-app:test
    profiles: ["jobs"]
    volumes:
      - ../workspace:/app/workspace
    env_file:
      - path: ../.env.local
        required: false
    command: ["python", "sync_financials_slow.py"]

  quant-daily:
    image: fin-app:test
    profiles: ["jobs"]
    volumes:
      - ../workspace:/app/workspace
      - ../outputs:/app/outputs
    env_file:
      - path: ../.env.local
        required: false
    command: ["python", "-m", "src.orchestration.run_daily", "--use-mock-data", "--skip-discord"]

volumes:
  prometheus-data:
  grafana-data:
