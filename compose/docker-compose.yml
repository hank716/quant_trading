services:
  quant-ui:
    build:
      context: ..
      dockerfile: docker/ui.Dockerfile
    image: fin-ui:latest
    container_name: fin-quant-ui
    ports:
      - "8501:8501"
    volumes:
      - ../workspace:/app/workspace
    env_file:
      - path: ../.env.local
        required: false
    restart: unless-stopped

  quant-sync:
    image: fin-app:test
    build:
      context: ..
      dockerfile: docker/app.Dockerfile
    profiles: ["jobs"]
    volumes:
      - ../workspace:/app/workspace
      - ../outputs:/app/outputs
    env_file:
      - path: ../.env.local
        required: false
    command: ["python", "sync_data.py"]

  quant-financials:
    image: fin-app:test
    build:
      context: ..
      dockerfile: docker/app.Dockerfile
    profiles: ["jobs"]
    volumes:
      - ../workspace:/app/workspace
    env_file:
      - path: ../.env.local
        required: false
    command: ["python", "sync_financials_slow.py"]

  quant-daily:
    image: fin-app:test
    build:
      context: ..
      dockerfile: docker/app.Dockerfile
    profiles: ["jobs"]
    volumes:
      - ../workspace:/app/workspace
      - ../outputs:/app/outputs
    env_file:
      - path: ../.env.local
        required: false
    command: ["python", "-m", "src.orchestration.run_daily", "--use-mock-data", "--skip-discord"]

  quant-trainer:
    build:
      context: ..
      dockerfile: docker/trainer.Dockerfile
    image: fin-trainer:latest
    profiles: ["jobs"]
    volumes:
      - ../workspace:/app/workspace
    env_file:
      - path: ../.env.local
        required: false
    command: ["python", "-m", "src.signals.trainer"]

  qlib-sync:
    build:
      context: ..
      dockerfile: docker/qlib.Dockerfile
    image: fin-qlib:latest
    profiles: ["jobs"]
    volumes:
      - ../workspace:/app/workspace
    env_file:
      - path: ../.env.local
        required: false
    command: ["python", "-m", "app.orchestration.sync_qlib_data", "--lookback-days", "5"]
