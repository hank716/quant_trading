# Quick debug workflow — small date range for fast iteration

qlib_init:
    provider_uri: "workspace/qlib_data"
    region: tw

market: &market all
benchmark: &benchmark ^TWII
data_handler_config: &data_handler_config
    class: TWCombinedHandler
    module_path: qlib_ext.handlers.tw_combined
    kwargs:
        start_time: "2022-01-01"
        end_time: "2023-12-31"
        fit_start_time: "2022-01-01"
        fit_end_time: "2022-12-31"

port_analysis_config: &port_analysis_config
    executor:
        class: SimulatorExecutor
        module_path: qlib.backtest.executor
        kwargs:
            time_per_step: "day"
            generate_portfolio_metrics: True
    strategy:
        class: TwTopkFilteredStrategy
        module_path: qlib_ext.strategies.tw_topk_filtered
        kwargs:
            signal: <PRED>
            topk: 30
            n_drop: 5
            min_price: 10.0
            min_listing_days: 180
    backtest:
        start_time: "2023-07-01"
        end_time: "2023-12-31"
        account: 100000000
        benchmark: *benchmark
        exchange_kwargs:
            limit_threshold: 0.095
            deal_price: close
            open_cost: 0.001425
            close_cost: 0.004425
            min_cost: 5

task:
    model:
        class: LGBModel
        module_path: qlib.contrib.model.gbdt
        kwargs:
            loss: mse
            colsample_bytree: 0.8
            learning_rate: 0.05
            subsample: 0.8
            lambda_l1: 10.0
            lambda_l2: 10.0
            max_depth: 4
            num_leaves: 31
            num_threads: 4
            early_stopping_rounds: 20
            eval_metric: mse
    dataset:
        class: DatasetH
        module_path: qlib.data.dataset
        kwargs:
            handler: *data_handler_config
            segments:
                train: ["2022-01-01", "2022-12-31"]
                valid: ["2023-01-01", "2023-06-30"]
                test: ["2023-07-01", "2023-12-31"]
    record:
        - class: SignalRecord
          module_path: qlib.workflow.record_temp
          kwargs:
            model: <MODEL>
            dataset: <DATASET>
        - class: SigAnaRecord
          module_path: qlib.workflow.record_temp
          kwargs:
            ana_long_short: False
            ann_scaler: 252
        - class: PortAnaRecord
          module_path: qlib.workflow.record_temp
          kwargs:
            config: *port_analysis_config
