# Handler configuration fragment — can be embedded in qrun YAML workflows.
# Used by Phase 8 daily_lgbm.yaml training workflow.

data_handler_config: &data_handler_config
  class: TWCombinedHandler
  module_path: qlib_ext.handlers.tw_combined
  kwargs:
    start_time: "2018-01-01"
    end_time: "2024-12-31"
    fit_start_time: "2018-01-01"
    fit_end_time: "2022-12-31"
    instruments: all
    include_fundamental: true
    infer_processors:
      - class: RobustZScoreNorm
        kwargs:
          fields_group: feature
          clip_outlier: true
      - class: Fillna
        kwargs:
          fields_group: feature
    learn_processors:
      - class: DropnaLabel
      - class: CSRankNorm
        kwargs:
          fields_group: label

# Standalone handler (tech-only, no fundamental fields required):
tech_only_handler_config: &tech_only_handler_config
  class: TWCombinedHandler
  module_path: qlib_ext.handlers.tw_combined
  kwargs:
    start_time: "2020-01-01"
    end_time: "2024-12-31"
    instruments: all
    include_fundamental: false
    infer_processors:
      - class: RobustZScoreNorm
        kwargs:
          fields_group: feature
          clip_outlier: true
      - class: Fillna
        kwargs:
          fields_group: feature
    learn_processors:
      - class: DropnaLabel
      - class: CSRankNorm
        kwargs:
          fields_group: label
