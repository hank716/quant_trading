qlib_init:
    provider_uri: "workspace/qlib_data"
    region: tw
    exp_manager:
        class: MLflowExpManager
        module_path: qlib.workflow.expm
        kwargs:
            uri: "file:workspace/mlruns"
            default_exp_name: workflow

market: &market all
benchmark: &benchmark ^TWII
data_handler_config: &data_handler_config
    class: TWCombinedHandler
    module_path: qlib_ext.handlers.tw_combined
    kwargs:
        start_time: "2025-04-22"
        end_time: "2026-04-22"
        fit_start_time: "2025-04-22"
        fit_end_time: "2025-12-31"

task:
    model:
        class: LGBModel
        module_path: qlib.contrib.model.gbdt
        kwargs:
            loss: mse
            colsample_bytree: 0.8879
            learning_rate: 0.0421
            subsample: 0.8789
            lambda_l1: 205.6999
            lambda_l2: 580.4327
            max_depth: 8
            num_leaves: 210
            num_threads: 20
            early_stopping_rounds: 50
            eval_metric: mse
    dataset:
        class: DatasetH
        module_path: qlib.data.dataset
        kwargs:
            handler: *data_handler_config
            segments:
                train: ["2025-04-22", "2025-12-31"]
                valid: ["2026-01-01", "2026-03-01"]
                test: ["2026-03-01", "2026-04-22"]
    record:
        - class: SignalRecord
          module_path: qlib.workflow.record_temp
          kwargs:
            model: <MODEL>
            dataset: <DATASET>
        - class: SigAnaRecord
          module_path: qlib.workflow.record_temp
          kwargs:
            ana_long_short: False
            ann_scaler: 252
